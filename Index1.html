<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khang Panh68</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

nav{
  padding:10px;
  background:black;
  text-align:center;
}

nav h2{
  color:red;
}

/* SEARCH */
.bar{
  padding:10px;
  background:#1a1a1a;
}

.bar input{
  width:100%;
  padding:8px;
  margin-bottom:5px;
  border:none;
  border-radius:6px;
}

.bar button{
  padding:8px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

.yt{background:red;}
.zing{background:#1db954;}

/* PLAYLIST */
.playlist{
  padding:10px;
  background:#181818;
  margin:10px;
  border-radius:10px;
}

.playlist button{
  padding:6px 10px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#ff0000;
  color:white;
}

/* GRID 3 CỘT */
.scroll{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  padding:10px;
}

.card{
  position:relative;
}

.card img{
  width:100%;
  border-radius:8px;
  cursor:pointer;
  aspect-ratio:2/3;
  object-fit:cover;
}

.star{
  position:absolute;
  top:5px;
  right:5px;
  background:gold;
  color:black;
  border:none;
  border-radius:50%;
  width:25px;
  height:25px;
  cursor:pointer;
}

/* FAVORITE */
.fav{
  padding:10px;
  background:#222;
}

.fav img{
  width:70px;
  margin:5px;
  border-radius:6px;
}

/* PLAYER */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
}

#modal iframe{
  width:95%;
  height:260px;
  border:none;
  border-radius:10px;
}

</style>
</head>

<body>

<nav>
  <h2>🎬 Khang Panh68</h2>
</nav>

<!-- SEARCH -->
<div class="bar">

  <input id="ytInput" placeholder="🔎 YouTube search...">
  <button class="yt" onclick="searchYT()">YouTube</button>

  <input id="zingInput" placeholder="🎧 Zing MP3 search...">
  <button class="zing" onclick="searchZing()">Zing MP3</button>

</div>

<!-- PLAYLIST -->
<div class="playlist">
  <h3>📂 Playlist</h3>
  <button onclick="openPlaylist('PLirxsEkduv0MwqEs1GKjt7JOupkWA8yNr')">Playlist 1</button>
  <button onclick="openPlaylist('PLh4trvZExvP1Gmnf0pbRrfIdsQQFjzMdn')">Playlist 2</button>
  <button onclick="openPlaylist('PLh4trvZExvP2UKz1LBOjt0n266zeL80ze')">Playlist 3</button>
</div>

<!-- FAVORITE -->
<div class="fav">
  <h3>💾 Phim đã lưu</h3>
  <div id="favList"></div>
</div>

<!-- MOVIES -->
<div class="scroll" id="list"></div>

<!-- PLAYER -->
<div id="modal" onclick="closeM()">
  <iframe id="frame" allow="autoplay"></iframe>
</div>

<script>

/* 💀 FULL VIDEO DATA (ĐÃ FIX KHÔNG MẤT) */
let movies = [
  {title:"Video 1",img:"https://img.youtube.com/vi/eZO29UZ28M4/hqdefault.jpg",video:"eZO29UZ28M4"},
  {title:"Video 2",img:"https://img.youtube.com/vi/9re7ISfjOkg/hqdefault.jpg",video:"9re7ISfjOkg"},
  {title:"Video 3",img:"https://img.youtube.com/vi/AXHRGAfCIhE/hqdefault.jpg",video:"AXHRGAfCIhE"},
  {title:"Video 4",img:"https://img.youtube.com/vi/xSasYrFxbnE/hqdefault.jpg",video:"xSasYrFxbnE"},
  {title:"Video 5",img:"https://img.youtube.com/vi/G3G7QRs90HU/hqdefault.jpg",video:"G3G7QRs90HU"},
  {title:"Video 6",img:"https://img.youtube.com/vi/9rDQedYo27k/hqdefault.jpg",video:"9rDQedYo27k"},

  {title:"Video 7",img:"https://img.youtube.com/vi/HM5wSCdhW9E/hqdefault.jpg",video:"HM5wSCdhW9E"},
  {title:"Video 8",img:"https://img.youtube.com/vi/_DeeahrurE8/hqdefault.jpg",video:"_DeeahrurE8"},
  {title:"Video 9",img:"https://img.youtube.com/vi/uzonpxJMpQ4/hqdefault.jpg",video:"uzonpxJMpQ4"},
  {title:"Video 10",img:"https://img.youtube.com/vi/zwOhNF7Sk7E/hqdefault.jpg",video:"zwOhNF7Sk7E"},
  {title:"Video 11",img:"https://img.youtube.com/vi/DTNqbY-pPtg/hqdefault.jpg",video:"DTNqbY-pPtg"},
  {title:"Video 12",img:"https://img.youtube.com/vi/x08ELZVwKeI/hqdefault.jpg",video:"x08ELZVwKeI"},
  {title:"Video 13",img:"https://img.youtube.com/vi/zC48NrwCunY/hqdefault.jpg",video:"zC48NrwCunY"},
  {title:"Video 14",img:"https://img.youtube.com/vi/MiT_sT9pMjg/hqdefault.jpg",video:"MiT_sT9pMjg"},
  {title:"Video 15",img:"https://img.youtube.com/vi/qGqpCzhr3a8/hqdefault.jpg",video:"qGqpCzhr3a8"},
  {title:"Video 16",img:"https://img.youtube.com/vi/lw9TWzPJ4z0/hqdefault.jpg",video:"lw9TWzPJ4z0"},
  {title:"Video 17",img:"https://img.youtube.com/vi/ORIHXZykEk0/hqdefault.jpg",video:"ORIHXZykEk0"},
  {title:"Video 18",img:"https://img.youtube.com/vi/ur1YsK5CI9M/hqdefault.jpg",video:"ur1YsK5CI9M"},
  {title:"Video 19",img:"https://img.youtube.com/vi/1pHDXfr7BOw/hqdefault.jpg",video:"1pHDXfr7BOw"}
];

/* FAVORITE */
let fav = JSON.parse(localStorage.getItem("fav")) || [];

function saveFav(m){
  if(!fav.find(f=>f.video===m.video)){
    fav.push(m);
    localStorage.setItem("fav",JSON.stringify(fav));
    renderFav();
  }
}

function removeFav(v){
  fav = fav.filter(f=>f.video!==v);
  localStorage.setItem("fav",JSON.stringify(fav));
  renderFav();
}

function renderFav(){
  let box=document.getElementById("favList");
  box.innerHTML="";
  fav.forEach(f=>{
    box.innerHTML+=`
    <img src="${f.img}">
    <button onclick="removeFav('${f.video}')">❌</button>
    `;
  });
}

/* RENDER FIX */
function render(){
  let box=document.getElementById("list");
  box.innerHTML="";

  movies.forEach(m=>{
    box.innerHTML+=`
    <div class="card">
      <img src="${m.img}" onclick="play('${m.video}')">
      <button class="star" onclick='saveFav(${JSON.stringify(m)})'>⭐</button>
    </div>
    `;
  });
}

/* PLAY */
function play(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("frame").src =
  "https://www.youtube.com/embed/"+id+"?autoplay=1";
}

/* CLOSE */
function closeM(){
  document.getElementById("modal").style.display="none";
  document.getElementById("frame").src="";
}

/* SEARCH */
function searchYT(){
  let q=document.getElementById("ytInput").value;
  window.open("https://www.youtube.com/results?search_query="+encodeURIComponent(q),"_blank");
}

function searchZing(){
  let q=document.getElementById("zingInput").value;
  window.open("https://zingmp3.vn/tim-kiem/bai-hat.html?q="+encodeURIComponent(q),"_blank");
}

/* PLAYLIST */
function openPlaylist(id){
  window.open("https://www.youtube.com/playlist?list="+id,"_blank");
}

/* START */
render();
renderFav();

</script>

</body>
</html>
