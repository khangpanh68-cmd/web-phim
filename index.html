<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khang Panh68</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='48' fill='black'/>
<text x='50' y='62' font-size='50' fill='red' text-anchor='middle'>KP</text>
</svg>">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* 🎬 INTRO 3D */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:fadeOut 3s forwards;
  animation-delay:2s;
}

.logo3d{
  font-size:70px;
  font-weight:bold;
  color:red;
  text-shadow:0 0 20px red,0 0 40px darkred;
  animation:spin3d 2s linear infinite, zoom 2s infinite;
}

@keyframes spin3d{
  0%{transform:rotateY(0deg);}
  50%{transform:rotateY(180deg);}
  100%{transform:rotateY(360deg);}
}

@keyframes zoom{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* HEADER */
header{
  background:#000;
  padding:12px;
  text-align:center;
}

.logo{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.logo-box{
  width:42px;
  height:42px;
  background:linear-gradient(45deg,red,darkred);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  box-shadow:0 0 15px red;
}

/* 🔥 CHỮ CHẠY NGANG */
.marquee{
  width:100%;
  white-space:nowrap;
  overflow:hidden;
  background:#111;
  color:red;
  font-weight:bold;
  padding:8px 0;
  border-top:1px solid #222;
  border-bottom:1px solid #222;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:run 12s linear infinite;
}

@keyframes run{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* SEARCH */
.bar{
  padding:10px;
  background:#1a1a1a;
}
.bar input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* PLAYLIST */
.playlists{
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
}
.playlists button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#333;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  cursor:pointer;
  transition:0.2s;
}
.card:hover{transform:scale(1.05);}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

.title{
  font-size:11px;
  text-align:center;
  margin-top:4px;
  min-height:30px;
}

/* PLAYER */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#modal iframe{
  width:95%;
  max-width:800px;
  height:260px;
  border:none;
  border-radius:12px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  font-size:12px;
  color:#777;
  border-top:1px solid #222;
  background:#0a0a0a;
}

</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div class="logo3d">KP</div>
</div>

<header>
  <div class="logo">
    <div class="logo-box">KP</div>
    <h2 style="color:red;margin:0;">Khang Panh68 Studio</h2>
  </div>
</header>

<!-- 🔥 MARQUEE -->
<div class="marquee">
  <span>
    🔥 Hành động • ⚔️ Chiến tranh • 🤖 AI đề xuất • 🎬 Phim hot • Khang Panh68 Studio • 🔥 Hành động • ⚔️ Chiến tranh • 🤖 AI đề xuất • 🎬 Phim hot • Khang Panh68 Studio
  </span>
</div>

<div class="bar">
  <input id="search" placeholder="🔎 Tìm phim..." oninput="searchMovie()">
</div>

<div class="playlists">
  <button onclick="setList('all')">🔥 Tất cả</button>
  <button onclick="setList('action')">💥 Hành động</button>
  <button onclick="setList('war')">⚔️ Chiến tranh</button>
  <button onclick="setList('ai')">🤖 AI đề xuất</button>
</div>

<div class="grid" id="list"></div>

<div id="modal" onclick="closeM()">
  <iframe id="frame" allow="autoplay"></iframe>
</div>

<footer>
  © Bản quyền thuộc về Khang Nguyễn – Thiết kế Khang Panh68 🎬
</footer>

<script>

/* 🎬 19 PHIM VIỆT HOÁ */
const movies = [
{title:"Quá Nhanh Quá Nguy Hiểm: Đường Đua Tử Thần",tag:"action",id:"eZO29UZ28M4"},
{title:"Biệt Đội Siêu Anh Hùng",tag:"action",id:"9re7ISfjOkg"},
{title:"Sát Thủ John Wick",tag:"action",id:"AXHRGAfCIhE"},
{title:"Người Nhện: Không Còn Đường Về Nhà",tag:"action",id:"xSasYrFxbnE"},
{title:"Nhiệm Vụ Bất Khả Thi",tag:"action",id:"G3G7QRs90HU"},
{title:"Chiến Tranh Robot",tag:"action",id:"9rDQedYo27k"},

{title:"Cuộc Đua Sinh Tử",tag:"action",id:"HM5wSCdhW9E"},
{title:"Điệp Viên Bóng Tối",tag:"action",id:"_DeeahrurE8"},

{title:"Đấu Trường Sinh Tử",tag:"war",id:"uzonpxJMpQ4"},
{title:"Chiến Tranh Công Nghệ",tag:"war",id:"zwOhNF7Sk7E"},
{title:"Rượt Đuổi Cảnh Sát",tag:"war",id:"DTNqbY-pPtg"},
{title:"Thế Giới Zombie",tag:"war",id:"zC48NrwCunY"},
{title:"Lực Lượng Đặc Nhiệm",tag:"war",id:"MiT_sT9pMjg"},
{title:"Khu Vực Chiến Sự",tag:"war",id:"lw9TWzPJ4z0"},

{title:"Điệp Viên Bí Mật",tag:"ai",id:"ORIHXZykEk0"},
{title:"Trùm Cuối Trận Chiến",tag:"ai",id:"ur1YsK5CI9M"},
{title:"Kết Thúc Chiến Binh",tag:"ai",id:"1pHDXfr7BOw"},
{title:"Chiến Tranh Không Gian",tag:"ai",id:"zwOhNF7Sk7E"},
{title:"Nhiệm Vụ Giải Cứu",tag:"ai",id:"qGqpCzhr3a8"}
];

let current = movies;

/* RENDER */
function render(list){
  let box=document.getElementById("list");
  box.innerHTML="";
  list.forEach(m=>{
    box.innerHTML+=`
    <div class="card" onclick="play('${m.id}')">
      <img src="https://img.youtube.com/vi/${m.id}/hqdefault.jpg">
      <div class="title">${m.title}</div>
    </div>`;
  });
}

/* FILTER */
function setList(type){
  if(type==="all") current=movies;
  else current=movies.filter(m=>m.tag===type);
  render(current);
}

/* SEARCH */
function searchMovie(){
  let v=document.getElementById("search").value.toLowerCase();
  render(current.filter(m=>m.title.toLowerCase().includes(v)));
}

/* PLAY */
function play(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("frame").src="https://www.youtube.com/embed/"+id+"?autoplay=1";
}

function closeM(){
  document.getElementById("modal").style.display="none";
  document.getElementById("frame").src="";
}

render(current);

</script>

</body>
</html>
