<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khang Panh68</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header{
  background:#000;
  padding:12px;
  text-align:center;
}

.logo-box{
  width:45px;
  height:45px;
  background:linear-gradient(45deg,red,darkred);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  margin:auto;
  box-shadow:0 0 15px red;
}

/* MARQUEE */
.marquee{
  white-space:nowrap;
  overflow:hidden;
  background:#111;
  color:red;
  font-weight:bold;
  padding:8px 0;
}
.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:run 12s linear infinite;
}
@keyframes run{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

/* SEARCH */
.bar{
  padding:10px;
  background:#1a1a1a;
}
.bar input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* FILTER */
.playlists{
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
}
.playlists button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#333;
  color:white;
}

/* ADD */
.add-box{
  padding:10px;
  margin:10px;
  background:#111;
  border-radius:10px;
  display:none;
}
.add-box input, .add-box select{
  width:100%;
  padding:8px;
  margin:5px 0;
}
.add-box button{
  width:100%;
  padding:10px;
  background:red;
  border:none;
  color:white;
  border-radius:8px;
}

/* ADMIN */
.admin-btn{
  text-align:center;
  margin:10px;
}
.admin-btn button{
  background:#222;
  border:1px solid red;
  color:white;
  padding:6px 10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  padding:10px;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}
.title{
  text-align:center;
  font-size:12px;
}

/* DELETE BUTTON */
.del-btn{
  width:100%;
  padding:5px;
  background:#b30000;
  color:white;
  border:none;
  border-radius:6px;
  margin-top:5px;
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
}
#modal iframe{
  width:95%;
  max-width:800px;
  height:260px;
  border:none;
  border-radius:12px;
}

/* LOGIN */
#loginBox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  align-items:center;
  justify-content:center;
}
#loginBox div{
  background:#111;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:300px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  font-size:12px;
  color:#777;
  border-top:1px solid #222;
}
</style>
</head>

<body>

<header>
  <div class="logo-box">KP</div>
  <h2 style="color:red;">Khang Panh68 Studio</h2>
</header>

<div class="marquee">
  <span>🔥 Hành động • ⚔️ Chiến tranh • 🤖 AI • 🎬 Khang Panh68 • </span>
</div>

<!-- ADMIN -->
<div class="admin-btn">
  <button onclick="openLogin()">🔐 Admin Login</button>
</div>

<!-- SEARCH -->
<div class="bar">
  <input id="search" placeholder="🔎 Tìm phim..." oninput="searchMovie()">
</div>

<!-- FILTER -->
<div class="playlists">
  <button onclick="render(movies)">🔥 Tất cả</button>
  <button onclick="filter('action')">💥 Hành động</button>
  <button onclick="filter('war')">⚔️ Chiến tranh</button>
  <button onclick="filter('ai')">🤖 AI</button>
</div>

<!-- ADD -->
<div class="add-box">
  <h3>➕ Thêm phim</h3>
  <input id="title" placeholder="Tên phim">
  <input id="vid" placeholder="YouTube ID">
  <select id="tag">
    <option value="action">Hành động</option>
    <option value="war">Chiến tranh</option>
    <option value="ai">AI</option>
  </select>
  <button onclick="addMovie()">➕ Thêm</button>
</div>

<!-- GRID -->
<div class="grid" id="list"></div>

<!-- PLAYER -->
<div id="modal" onclick="closeM(event)">
  <iframe id="frame"></iframe>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <div>
    <h3>🔐 Admin Login</h3>
    <input id="user" placeholder="Tài khoản">
    <input id="pass" type="password" placeholder="Mật khẩu">
    <button onclick="login()" style="width:100%;padding:10px;background:red;color:white;margin-top:10px;">Đăng nhập</button>
    <button onclick="closeLogin()" style="width:100%;padding:8px;margin-top:5px;background:#333;color:white;">Hủy</button>
  </div>
</div>

<footer>
  © 2026 Khang Panh68 Studio – All rights reserved
</footer>

<script>

let isAdmin = false;

/* 🔥 19 VIDEO GỐC */
const DEFAULT_MOVIES = [
{title:"Quá Nhanh Quá Nguy Hiểm",tag:"action",id:"eZO29UZ28M4"},
{title:"Biệt Đội Siêu Anh Hùng",tag:"action",id:"9re7ISfjOkg"},
{title:"John Wick",tag:"action",id:"AXHRGAfCIhE"},
{title:"Người Nhện",tag:"action",id:"xSasYrFxbnE"},
{title:"Nhiệm Vụ Bất Khả Thi",tag:"action",id:"G3G7QRs90HU"},
{title:"Robot Chiến Tranh",tag:"action",id:"9rDQedYo27k"},
{title:"Cuộc Đua Sinh Tử",tag:"action",id:"HM5wSCdhW9E"},
{title:"Điệp Viên Bóng Tối",tag:"action",id:"_DeeahrurE8"},

{title:"Đấu Trường Sinh Tử",tag:"war",id:"uzonpxJMpQ4"},
{title:"Chiến Tranh Công Nghệ",tag:"war",id:"zwOhNF7Sk7E"},
{title:"Rượt Đuổi Cảnh Sát",tag:"war",id:"DTNqbY-pPtg"},
{title:"Zombie World",tag:"war",id:"zC48NrwCunY"},
{title:"Lực Lượng Đặc Nhiệm",tag:"war",id:"MiT_sT9pMjg"},
{title:"Khu Vực Chiến Sự",tag:"war",id:"lw9TWzPJ4z0"},

{title:"Điệp Viên Bí Mật",tag:"ai",id:"ORIHXZykEk0"},
{title:"Trùm Cuối",tag:"ai",id:"ur1YsK5CI9M"},
{title:"Kết Thúc Chiến Binh",tag:"ai",id:"1pHDXfr7BOw"},
{title:"Chiến Tranh Không Gian",tag:"ai",id:"zwOhNF7Sk7E"},
{title:"Nhiệm Vụ Giải Cứu",tag:"ai",id:"qGqpCzhr3a8"}
];

let movies = JSON.parse(localStorage.getItem("movies")) || DEFAULT_MOVIES;

function save(){
  localStorage.setItem("movies",JSON.stringify(movies));
}

/* RENDER */
function render(list){
  let box=document.getElementById("list");
  box.innerHTML="";

  list.forEach((m,i)=>{
    box.innerHTML+=`
    <div class="card">
      <img onclick="play('${m.id}')" src="https://img.youtube.com/vi/${m.id}/hqdefault.jpg">
      <div class="title">${m.title}</div>

      ${isAdmin ? `<button class="del-btn" onclick="deleteMovie(${i})">❌ Xóa</button>` : ``}
    </div>`;
  });
}

/* DELETE */
function deleteMovie(i){
  if(confirm("Xóa phim này?")){
    movies.splice(i,1);
    save();
    render(movies);
  }
}

/* FILTER */
function filter(t){
  render(movies.filter(m=>m.tag===t));
}

/* SEARCH */
function searchMovie(){
  let v=document.getElementById("search").value.toLowerCase();
  render(movies.filter(m=>m.title.toLowerCase().includes(v)));
}

/* ADD */
function addMovie(){
  let t=document.getElementById("title").value;
  let i=document.getElementById("vid").value;
  let g=document.getElementById("tag").value;

  if(!t||!i)return alert("Thiếu dữ liệu!");

  movies.push({title:t,id:i,tag:g});
  save();
  render(movies);
}

/* PLAY */
function play(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("frame").src="https://www.youtube.com/embed/"+id+"?autoplay=1";
}

function closeM(e){
  if(e.target.id==="modal"){
    document.getElementById("modal").style.display="none";
    document.getElementById("frame").src="";
  }
}

/* LOGIN */
function openLogin(){
  document.getElementById("loginBox").style.display="flex";
}
function closeLogin(){
  document.getElementById("loginBox").style.display="none";
}

function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="Khangpanh68" && p==="51007Panh"){
    isAdmin = true;
    document.querySelector(".add-box").style.display="block";
    render(movies);
    closeLogin();
    alert("✔ Admin đã bật!");
  }else{
    alert("Sai tài khoản!");
  }
}

render(movies);

</script>

</body>
</html>
