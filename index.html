<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khang Panh68 Studio - Cloud Full Sync</title>
<style>
/* CSS Giao diện chuyên nghiệp của Khang */
body{ margin:0; font-family:Arial; background:#0b0b0b; color:white; overflow-x: hidden; }
header{ background:#000; padding:15px; text-align:center; border-bottom: 2px solid red; }
.logo-box{ width:45px; height:45px; background:linear-gradient(45deg,red,darkred); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; margin:auto; box-shadow:0 0 15px red; font-size: 20px; }
.marquee{ white-space:nowrap; overflow:hidden; background:#111; color:red; font-weight:bold; padding:10px 0; border-bottom: 1px solid #222; }
.marquee span{ display:inline-block; padding-left:100%; animation:run 15s linear infinite; }
@keyframes run{ 0%{transform:translateX(0);} 100%{transform:translateX(-100%);} }
.bar{ padding:15px; background:#1a1a1a; }
.bar input{ width:100%; padding:12px; border:none; border-radius:8px; box-sizing: border-box; background:#333; color:white; outline: none; }
.playlists{ display:flex; gap:10px; padding:10px; overflow-x:auto; scrollbar-width: none; }
.playlists::-webkit-scrollbar { display: none; }
.playlists button{ padding:10px 18px; border:none; border-radius:25px; background:#222; color:white; white-space: nowrap; cursor:pointer; border: 1px solid #444; transition: 0.3s; }
.playlists button:active { background: red; border-color: red; }
.add-box{ padding:15px; margin:15px; background:#111; border: 1px dashed red; border-radius:10px; display:none; }
.add-box input, .add-box select{ width:100%; padding:10px; margin:5px 0; box-sizing: border-box; border-radius: 5px; border: 1px solid #333; background: #222; color: white; }
.add-box button{ width:100%; padding:12px; background:red; border:none; color:white; border-radius:8px; font-weight: bold; margin-top: 10px; }
.admin-btn{ text-align:center; margin:10px; }
.admin-btn button{ background:transparent; border:1px solid red; color:red; padding:6px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:15px; padding:15px; }
.card { background: #1a1a1a; border-radius: 12px; overflow: hidden; transition: 0.3s; }
.card img{ width:100%; height:110px; object-fit:cover; cursor: pointer; }
.card:hover { transform: translateY(-5px); }
.title{ text-align:center; font-size:13px; padding:10px; height:35px; display: flex; align-items: center; justify-content: center; }
.del-btn{ width:90%; padding:6px; background:#b30000; color:white; border:none; border-radius:6px; margin: 0 5% 10px 5%; cursor: pointer; font-size: 12px; }
#modal{ position:fixed; inset:0; background:rgba(0,0,0,0.98); display:none; align-items:center; justify-content:center; z-index: 1000; }
#modal iframe{ width:100%; max-width:800px; height:280px; border:none; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
#loginBox{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index: 1001; }
#loginBox div{ background:#111; padding:25px; border-radius:15px; width:85%; max-width:320px; border: 1px solid red; }
footer{ text-align:center; padding:25px; font-size:12px; color:#555; border-top:1px solid #222; margin-top: 20px; }
</style>
</head>

<body>

<header>
  <div class="logo-box">KP</div>
  <h2 style="color:red; margin: 10px 0 0 0;">Khang Panh68 Studio</h2>
</header>

<div class="marquee">
  <span>🔥 Hành động • ⚔️ Chiến tranh • 🤖 AI • 🎬 Khang Panh68 • 🚀 Cloud Save Hệ Thống Mới • </span>
</div>

<div class="admin-btn">
  <button id="btnOpenLogin">🔐 Ông Trời</button>
</div>

<div class="bar">
  <input id="search" placeholder="🔎 Tìm tên phim bạn muốn xem...">
</div>

<div class="playlists">
  <button id="btnFilterAll">🔥 Tất cả</button>
  <button id="btnFilterAction">💥 Hành động</button>
  <button id="btnFilterWar">⚔️ Chiến tranh</button>
  <button id="btnFilterAI">🤖 AI</button>
</div>

<div class="add-box" id="addBox">
  <h3 style="color: red; margin-top: 0;">➕ Quản lý Cloud</h3>
  <input id="newTitle" placeholder="Tên phim mới">
  <input id="newVid" placeholder="YouTube Video ID">
  <select id="newTag">
    <option value="action">Hành động</option>
    <option value="war">Chiến tranh</option>
    <option value="ai">AI</option>
  </select>
  <button id="btnAddMovie">LƯU LÊN CLOUD</button>
</div>

<div class="grid" id="list">
  <p style="text-align:center; width:100%; grid-column: 1/-1;">Đang tải dữ liệu từ Cloud...</p>
</div>

<div id="modal">
  <iframe id="frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div id="loginBox">
  <div>
    <h3 style="text-align: center;">🔐 Ông Trời</h3>
    <input id="user" placeholder="Tên đăng nhập">
    <input id="pass" type="password" placeholder="Mật khẩu">
    <button id="btnLogin">XÁC NHẬN</button>
    <button id="btnCloseLogin" style="background:#333; margin-top: 8px;">ĐÓNG</button>
  </div>
</div>

<footer>
  © 2026 Khang Panh68 Studio <br> Dữ liệu được bảo mật trên Firebase Cloud
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  // --- 1. THAY MÃ CONFIG CỦA BẠN VÀO ĐÂY ---
  const firebaseConfig = {
    apiKey: "AIza...", 
    authDomain: "khang-panh-68.firebaseapp.com",
    projectId: "khang-panh-68",
    storageBucket: "khang-panh-68.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const docRef = doc(db, "studio_data", "movie_list");

  let movies = [];
  let isAdmin = false;

  // --- 2. DANH SÁCH 19 VIDEO GỐC ---
  const DEFAULT_MOVIES = [
    {title:"Quá Nhanh Quá Nguy Hiểm",tag:"action",id:"eZO29UZ28M4"},
    {title:"Biệt Đội Siêu Anh Hùng",tag:"action",id:"9re7ISfjOkg"},
    {title:"John Wick",tag:"action",id:"AXHRGAfCIhE"},
    {title:"Người Nhện",tag:"action",id:"xSasYrFxbnE"},
    {title:"Nhiệm Vụ Bất Khả Thi",tag:"action",id:"G3G7QRs90HU"},
    {title:"Robot Chiến Tranh",tag:"action",id:"9rDQedYo27k"},
    {title:"Cuộc Đua Sinh Tử",tag:"action",id:"HM5wSCdhW9E"},
    {title:"Điệp Viên Bóng Tối",tag:"action",id:"_DeeahrurE8"},
    {title:"Đấu Trường Sinh Tử",tag:"war",id:"uzonpxJMpQ4"},
    {title:"Chiến Tranh Công Nghệ",tag:"war",id:"zwOhNF7Sk7E"},
    {title:"Rượt Đuổi Cảnh Sát",tag:"war",id:"DTNqbY-pPtg"},
    {title:"Zombie World",tag:"war",id:"zC48NrwCunY"},
    {title:"Lực Lượng Đặc Nhiệm",tag:"war",id:"MiT_sT9pMjg"},
    {title:"Khu Vực Chiến Sự",tag:"war",id:"lw9TWzPJ4z0"},
    {title:"Điệp Viên Bí Mật",tag:"ai",id:"ORIHXZykEk0"},
    {title:"Trùm Cuối",tag:"ai",id:"ur1YsK5CI9M"},
    {title:"Kết Thúc Chiến Binh",tag:"ai",id:"1pHDXfr7BOw"},
    {title:"Chiến Tranh Không Gian",tag:"ai",id:"zwOhNF7Sk7E"},
    {title:"Nhiệm Vụ Giải Cứu",tag:"ai",id:"qGqpCzhr3a8"}
  ];

  // --- 3. ĐỒNG BỘ CLOUD ---
  onSnapshot(docRef, (docSnap) => {
    if (docSnap.exists()) {
      const cloudData = docSnap.data().data || [];
      // Tự động hồi phục nếu mây bị trống hoặc lỗi
      if (cloudData.length === 0) {
        movies = DEFAULT_MOVIES;
        saveToCloud();
      } else {
        movies = cloudData;
      }
    } else {
      movies = DEFAULT_MOVIES;
      saveToCloud(); 
    }
    render(movies);
  });

  async function saveToCloud() {
    try {
      await setDoc(docRef, { data: movies });
    } catch (e) { console.error(e); }
  }

  // --- 4. RENDER GIAO DIỆN ---
  function render(list) {
    const box = document.getElementById("list");
    box.innerHTML = "";
    if(list.length === 0) box.innerHTML = "<p>Trống...</p>";
    
    list.forEach((m, i) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="https://img.youtube.com/vi/${m.id}/hqdefault.jpg" onclick="window.playVideo('${m.id}')">
        <div class="title">${m.title}</div>
        ${isAdmin ? `<button class="del-btn" onclick="window.deleteMovie(${i})">❌ Gỡ khỏi Cloud</button>` : ""}
      `;
      box.appendChild(card);
    });
  }

  // --- 5. LOGIC CHỨC NĂNG ---
  window.deleteMovie = async (index) => {
    if(confirm("Bạn có chắc chắn muốn xóa video này khỏi Cloud?")) {
      movies.splice(index, 1);
      await saveToCloud();
    }
  };

  document.getElementById("btnAddMovie").onclick = async () => {
    const t = document.getElementById("newTitle").value;
    const i = document.getElementById("newVid").value;
    const g = document.getElementById("newTag").value;
    if(!t || !i) return alert("Vui lòng điền đủ tên và ID video!");
    
    movies.push({title: t, id: i, tag: g});
    await saveToCloud();
    document.getElementById("newTitle").value = "";
    document.getElementById("newVid").value = "";
    alert("Đã lưu thành công!");
  };

  window.playVideo = (id) => {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("frame").src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  };

  document.getElementById("modal").onclick = (e) => {
    if(e.target.id === "modal") {
      document.getElementById("modal").style.display = "none";
      document.getElementById("frame").src = "";
    }
  };

  // Login
  document.getElementById("btnOpenLogin").onclick = () => document.getElementById("loginBox").style.display = "flex";
  document.getElementById("btnCloseLogin").onclick = () => document.getElementById("loginBox").style.display = "none";
  
  document.getElementById("btnLogin").onclick = () => {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;
    if(u === "Khangpanh68" && p === "51007Panh") {
      isAdmin = true;
      document.getElementById("addBox").style.display = "block";
      document.getElementById("loginBox").style.display = "none";
      render(movies);
      alert("Xác thực thành công! Quyền Admin đã mở.");
    } else {
      alert("Sai thông tin đăng nhập!");
    }
  };

  // Search & Filter
  document.getElementById("search").oninput = (e) => {
    const v = e.target.value.toLowerCase();
    render(movies.filter(m => m.title.toLowerCase().includes(v)));
  };

  document.getElementById("btnFilterAll").onclick = () => render(movies);
  document.getElementById("btnFilterAction").onclick = () => render(movies.filter(m => m.tag === "action"));
  document.getElementById("btnFilterWar").onclick = () => render(movies.filter(m => m.tag === "war"));
  document.getElementById("btnFilterAI").onclick = () => render(movies.filter(m => m.tag === "ai"));

</script>
</body>
</html>
